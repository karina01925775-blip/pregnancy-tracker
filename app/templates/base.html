<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мама рядом — {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <!-- 🔹 ВЕРХНИЙ БАННЕР (показывается, если нет токена) -->
    <div id="auth-banner" class="auth-banner">
        <span class="auth-banner-icon">🔔</span>
        <span class="auth-banner-text">Для доступа ко всем функциям необходимо войти в систему</span>
        <a href="/auth/login" class="auth-banner-btn">Войти</a>
        <button class="auth-banner-close" onclick="closeBanner()">×</button>
    </div>

    <!-- ===== ГЛАВНАЯ СТРАНИЦА ===== -->
    <main class="page active" id="page-home">
        <section class="greeting" id="greeting-section" data-username="{{ name | default('Гость') }}">
            <h1 id="greeting-text"></h1>
            <p id="greeting-sub"></p>
        </section>
        <section class="calendar" id="calendar"
         data-range-start="{{ range_start | default('') }}"
         data-range-end="{{ range_end | default('') }}">
            <div class="calendar-header">
                <button id="prev-month">‹</button>
                <h2 id="month-year"></h2>
                <button id="next-month">›</button>
            </div>
            <div class="calendar-weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span>
                <span>Пт</span><span>Сб</span><span>Вс</span>
            </div>
            <div class="calendar-days" id="calendar-days"></div>
        </section>
    </main>

    <!-- ===== СТРАНИЦА ПРОФИЛЯ ===== -->
    <main class="page" id="page-profile">
        <div class="profile-card" id="profile-content">
            <div class="avatar">👤</div>
            <h2>{{ name | default('Гость') }}</h2>
            <p class="email">{{ email | default('') }}</p>
            <div class="profile-stats">
                <div class="stat">
                    <div class="number">128</div>
                    <div class="label">Первое</div>
                </div>
                <div class="stat">
                    <div class="number">42</div>
                    <div class="label">Второе</div>
                </div>
                <div class="stat">
                    <div class="number">7</div>
                    <div class="label">Третье</div>
                </div>
            </div>
        </div>
        <div class="auth-prompt" id="profile-auth-prompt" style="display: none;"></div>
    </main>

    <!-- ===== ПОДВАЛ ===== -->
    <footer>
        <p>&copy; 2026 Мой Сайт. Сделано с ❤️</p>
    </footer>

    <!-- ===== ПЛАВАЮЩЕЕ МЕНЮ ===== -->
    <nav class="floating-menu" id="floating-menu">
        <div class="drag-handle"><span></span></div>
        <button class="active" data-page="page-home">🏠 Главная</button>
        <button data-page="page-profile">👤 Профиль</button>
    </nav>
    <!-- ===== СКРИПТЫ ===== -->
    <script src="static/js/home.js" defer></script>
</body>
</html>
