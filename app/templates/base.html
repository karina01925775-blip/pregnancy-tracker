<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мама рядом — {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>

    <!-- ===== ГЛАВНАЯ СТРАНИЦА ===== -->
    <main class="page active" id="page-home">
        <section class="greeting" id="greeting-section" data-username="{{ name | default('Гость') }}">
            <h1 id="greeting-text"></h1>
            <p id="greeting-sub"></p>
        </section>
        <section class="calendar" id="calendar">
            <div class="calendar-header">
                <button id="prev-month">‹</button>
                <h2 id="month-year"></h2>
                <button id="next-month">›</button>
            </div>
            <div class="calendar-weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span>
                <span>Пт</span><span>Сб</span><span>Вс</span>
            </div>
            <div class="calendar-days" id="calendar-days"></div>
        </section>
    </main>

    <!-- ===== СТРАНИЦА ПРОФИЛЯ ===== -->
    <main class="page" id="page-profile">
        <div class="profile-card">
            <div class="avatar">👤</div>
            <h2>Иван Иванов</h2>
            <p class="email">ivan@example.com</p>
            <div class="profile-stats">
                <div class="stat">
                    <div class="number">128</div>
                    <div class="label">Дней</div>
                </div>
                <div class="stat">
                    <div class="number">42</div>
                    <div class="label">Задачи</div>
                </div>
                <div class="stat">
                    <div class="number">7</div>
                    <div class="label">Проекты</div>
                </div>
            </div>
        </div>
    </main>

    <!-- ===== ПОДВАЛ ===== -->
    <footer>
        <p>&copy; 2026 Мой Сайт. Сделано с ❤️</p>
    </footer>

    <!-- ===== ПЛАВАЮЩЕЕ МЕНЮ ===== -->
    <nav class="floating-menu" id="floating-menu">
        <div class="drag-handle"><span></span></div>
        <button class="active" data-page="page-home">🏠 Главная</button>
        <button data-page="page-profile">👤 Профиль</button>
        <button id="add-event-btn-nav">📅 Добавить событие</button>
    </nav>

    <!-- ===== МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ СОБЫТИЯ ===== -->
    <div class="modal-overlay" id="event-modal-overlay">
        <div class="modal-window" id="event-modal">
            <h3>Добавить важное событие</h3>
            <form id="event-form">
                <label for="event-type">Тип события:</label>
                <select id="event-type" required>
                    <option value="">Выберите тип события</option>
                    <option value="visit">🩺 Визит к врачу</option>
                    <option value="analysis">🧪 Анализы</option>
                    <option value="ultrasound">📷 УЗИ</option>
                    <option value="other">📝 Другое</option>
                </select>
                <input type="text" id="event-title" placeholder="Название события" required>
                
                <label for="event-date">Дата:</label>
                <input type="date" id="event-date" required>
                
                <label for="event-time">Время:</label>
                <input type="time" id="event-time" required>
                
                <label for="event-notes">Заметки (необязательно):</label>
                <textarea id="event-notes" rows="3" placeholder="Дополнительная информация"></textarea>
                
                <div class="modal-buttons">
                    <button type="submit" class="save-btn">Сохранить</button>
                    <button type="button" class="cancel-btn" id="cancel-event-btn">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ПРОСМОТРА СОБЫТИЙ ДНЯ ===== -->
    <div class="day-events-modal-overlay" id="day-events-modal-overlay">
        <div class="day-events-modal-window" id="day-events-modal">
            <h3 id="day-events-title">События дня</h3>
            <ul class="day-events-list" id="day-events-list"></ul>
            <button class="close-day-events-btn" id="close-day-events-btn">Закрыть</button>
        </div>
    </div>

    <!-- ===== СКРИПТЫ ===== -->
    <script src="static/js/script.js" defer></script>
</body>
</html>
