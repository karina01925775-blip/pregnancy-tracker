<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="card">
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Вход</button>
            <button class="tab" onclick="switchTab('register')">Регистрация</button>
        </div>

        <!-- Форма входа (id="login-form" как в JS) -->
        <div id="login-panel" class="panel active">
            <h2>Добро пожаловать</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login_email" placeholder="example@mail.ru">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="login_password" placeholder="••••••">
            </div>
            <button class="btn" onclick="doLogin()">Войти</button>
            <div id="login_msg" class="msg"></div>
        </div>

        <!-- Форма регистрации (id="register-form" как в JS) -->
        <div id="register-panel" class="panel">
            <h2>Создать аккаунт</h2>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg_email" placeholder="example@mail.ru">
            </div>
            <div class="input-group">
                <label>Полное имя</label>
                <input type="text" id="reg_name" placeholder="Диана Диана">
            </div>
            <div class="input-group">
                <label>Телефон</label>
                <input type="tel" id="reg_phone" placeholder="+7 999 123-45-67">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="reg_password"
                   placeholder="минимум 6 символов"
                   minlength="6"
                   maxlength="128">
            </div>
            <button class="btn" onclick="doRegister()">Зарегистрироваться</button>
            <div id="register_msg" class="msg"></div>
        </div>

        <hr><a href="/" class="back-link">← На главную</a>
    </div>

    <!-- ✅ Путь со слэшем в начале -->
    <script src="/static/js/login.js" defer></script>
</body>
</html>
