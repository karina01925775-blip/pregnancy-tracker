<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход и регистрация</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:linear-gradient(135deg,#FDF8F8,#F5F0E8);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:rgba(255,255,255,0.95);border-radius:32px;padding:32px;width:100%;max-width:400px;box-shadow:0 20px 40px rgba(0,0,0,0.08)}
        .tabs{display:flex;gap:8px;margin-bottom:32px;background:#f0f0f0;padding:4px;border-radius:60px}
        .tab{flex:1;text-align:center;padding:12px;border:none;background:transparent;font-size:16px;font-weight:600;cursor:pointer;border-radius:60px;color:#8A847C}
        .tab.active{background:#F4C2C2;color:#4a3f3f}
        .panel{display:none}
        .panel.active{display:block}
        .panel h2{text-align:center;font-size:24px;margin-bottom:28px;color:#3E3C38}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;font-size:14px;font-weight:500;color:#3E3C38;margin-bottom:8px}
        .input-group input{width:100%;padding:14px 16px;border:1.5px solid #E8DCC8;border-radius:16px;font-size:15px}
        .input-group input:focus{outline:none;border-color:#F4C2C2}
        .btn{width:100%;padding:14px;border:none;border-radius:60px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;background:#F4C2C2;color:#4a3f3f}
        .btn:hover{background:#e8b0b0}
        .msg{margin-top:16px;padding:10px;border-radius:12px;text-align:center;font-size:13px}
        .msg.error{background:#ffe0e0;color:#c0392b}
        .msg.success{background:#d4edda;color:#27ae60}
        .back-link{display:block;text-align:center;margin-top:24px;color:#8A847C;text-decoration:none;font-size:14px}
        .back-link:hover{color:#F4C2C2}
        hr{margin:16px 0;border:none;border-top:1px solid #E8DCC8}
    </style>
</head>
<body>
<div class="card">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Вход</button>
        <button class="tab" onclick="switchTab('register')">Регистрация</button>
    </div>
    <div id="login-panel" class="panel active">
        <h2>Добро пожаловать</h2>
        <div class="input-group"><label>Email</label><input type="email" id="login_email" placeholder="example@mail.ru"></div>
        <div class="input-group"><label>Пароль</label><input type="password" id="login_password" placeholder="••••••"></div>
        <button class="btn" onclick="doLogin()">Войти</button>
        <div id="login_msg" class="msg"></div>
    </div>
    <div id="register-panel" class="panel">
        <h2>Создать аккаунт</h2>
        <div class="input-group"><label>Email</label><input type="email" id="reg_email" placeholder="example@mail.ru"></div>
        <div class="input-group"><label>Полное имя</label><input type="text" id="reg_name" placeholder="Иванова Мария"></div>
        <div class="input-group"><label>Телефон</label><input type="tel" id="reg_phone" placeholder="+7 999 123-45-67"></div>
        <div class="input-group"><label>Пароль</label><input type="password" id="reg_password" placeholder="минимум 6 символов"></div>
        <button class="btn" onclick="doRegister()">Зарегистрироваться</button>
        <div id="register_msg" class="msg"></div>
    </div>
    <hr><a href="/" class="back-link">← На главную</a>
</div>
<script>
function switchTab(tab){
    const loginPanel=document.getElementById('login-panel');
    const registerPanel=document.getElementById('register-panel');
    const tabs=document.querySelectorAll('.tab');
    if(tab==='login'){
        loginPanel.classList.add('active');
        registerPanel.classList.remove('active');
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
    } else {
        loginPanel.classList.remove('active');
        registerPanel.classList.add('active');
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
    }
    document.getElementById('login_msg').innerHTML='';
    document.getElementById('register_msg').innerHTML='';
}
async function doLogin(){
    const email=document.getElementById('login_email').value;
    const password=document.getElementById('login_password').value;
    const msg=document.getElementById('login_msg');
    if(!email||!password){msg.innerHTML='Заполните поля';msg.className='msg error';return;}
    msg.innerHTML='Вход...';msg.className='msg';
    const fd=new URLSearchParams();
    fd.append('username',email);fd.append('password',password);
    try{
        const res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd});
        const data=await res.json();
        if(res.ok){
            localStorage.setItem('token',data.access_token);
            msg.innerHTML='Успешно!';msg.className='msg success';
            setTimeout(()=>{window.location.href='/';},1000);
        } else {msg.innerHTML=data.detail||'Ошибка';msg.className='msg error';}
    } catch(e){msg.innerHTML='Ошибка';msg.className='msg error';}
}
async function doRegister(){
    const email=document.getElementById('reg_email').value;
    const name=document.getElementById('reg_name').value;
    const phone=document.getElementById('reg_phone').value;
    const password=document.getElementById('reg_password').value;
    const msg=document.getElementById('register_msg');
    if(!email||!name||!password){msg.innerHTML='Заполните поля';msg.className='msg error';return;}
    if(password.length<6){msg.innerHTML='Пароль >6 символов';msg.className='msg error';return;}
    msg.innerHTML='Отправка...';msg.className='msg';
    try{
        const res=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,full_name:name,phone:phone||'',password:password,role:'patient'})});
        const data=await res.json();
        if(res.ok){
            msg.innerHTML='Регистрация успешна!';msg.className='msg success';
            setTimeout(()=>switchTab('login'),2000);
        } else {msg.innerHTML=data.detail||'Ошибка';msg.className='msg error';}
    } catch(e){msg.innerHTML='Ошибка';msg.className='msg error';}
}
</script>
</body>
</html>
